<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Admin Dashboard - Museum Bahari Ngera Shells</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            font-family: 'Segoe UI', Tahoma, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 2rem;
        }
        
        .container {
            max-width: 1400px;
            margin: 0 auto;
        }
        
        .header {
            background: white;
            padding: 2rem;
            border-radius: 20px;
            margin-bottom: 2rem;
            box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        }
        
        .header h1 {
            color: #006994;
            margin-bottom: 0.5rem;
        }
        
        .header p {
            color: #666;
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 1.5rem;
            margin-bottom: 2rem;
        }
        
        .stat-card {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            transition: transform 0.3s;
        }
        
        .stat-card:hover {
            transform: translateY(-5px);
        }
        
        .stat-icon {
            width: 60px;
            height: 60px;
            background: linear-gradient(135deg, #006994, #004d73);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.8rem;
            margin-bottom: 1rem;
        }
        
        .stat-number {
            font-size: 2.5rem;
            font-weight: 900;
            color: #006994;
            margin-bottom: 0.5rem;
        }
        
        .stat-label {
            color: #666;
            font-size: 0.9rem;
        }
        
        .chart-container {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
            margin-bottom: 2rem;
        }
        
        .chart-container h2 {
            color: #006994;
            margin-bottom: 1.5rem;
        }
        
        .visitors-list {
            background: white;
            padding: 2rem;
            border-radius: 15px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        .visitors-list h2 {
            color: #006994;
            margin-bottom: 1.5rem;
        }
        
        .visitor-item {
            display: flex;
            align-items: center;
            gap: 1rem;
            padding: 1rem;
            border-bottom: 1px solid #eee;
            transition: background 0.2s;
        }
        
        .visitor-item:hover {
            background: #f8f9fa;
        }
        
        .visitor-avatar {
            width: 50px;
            height: 50px;
            background: linear-gradient(135deg, #ff6b6b, #ffa502);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1.5rem;
            font-weight: 700;
        }
        
        .visitor-info {
            flex: 1;
        }
        
        .visitor-name {
            font-weight: 600;
            color: #333;
            margin-bottom: 0.3rem;
        }
        
        .visitor-meta {
            font-size: 0.85rem;
            color: #666;
        }
        
        .visitor-stats {
            text-align: right;
        }
        
        .visitor-visits {
            font-weight: 700;
            color: #006994;
            font-size: 1.2rem;
        }
        
        .visitor-label {
            font-size: 0.8rem;
            color: #666;
        }
        
        .btn-reset {
            background: #ef4444;
            color: white;
            border: none;
            padding: 0.8rem 1.5rem;
            border-radius: 10px;
            cursor: pointer;
            font-weight: 600;
            margin-top: 1rem;
        }
        
        .btn-reset:hover {
            background: #dc2626;
        }
        
        .empty-state {
            text-align: center;
            padding: 3rem;
            color: #999;
        }
        
        .empty-state i {
            font-size: 4rem;
            margin-bottom: 1rem;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="header">
        <h1><i class="fas fa-chart-line"></i> Admin Dashboard</h1>
        <p>Museum Bahari Ngera Shells - Statistik Pengunjung</p>
    </div>
    
    <div class="stats-grid" id="statsGrid">
        <!-- Stats will be loaded here -->
    </div>
    
    <div class="chart-container">
        <h2><i class="fas fa-chart-bar"></i> Statistik 7 Hari Terakhir</h2>
        <canvas id="visitsChart"></canvas>
    </div>
    
    <div class="visitors-list">
        <h2><i class="fas fa-users"></i> Pengunjung Terbaru</h2>
        <div id="visitorsList">
            <!-- Visitors will be loaded here -->
        </div>
        <button class="btn-reset" onclick="resetAnalytics()">
            <i class="fas fa-trash"></i> Reset Data
        </button>
    </div>
</div>

<script src="js/components/analytics.js"></script>
<script>
// Load dashboard
function loadDashboard() {
    const stats = analyticsManager.getStats();
    const recentVisitors = analyticsManager.getRecentVisitors(10);
    const dailyStats = analyticsManager.getDailyStats(7);
    
    // Render stats cards
    document.getElementById('statsGrid').innerHTML = `
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-users"></i></div>
            <div class="stat-number">${stats.totalVisitors}</div>
            <div class="stat-label">Total Pengunjung Unik</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-eye"></i></div>
            <div class="stat-number">${stats.totalVisits}</div>
            <div class="stat-label">Total Kunjungan</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-file-alt"></i></div>
            <div class="stat-number">${Object.keys(stats.pageViews).length}</div>
            <div class="stat-label">Halaman Dilihat</div>
        </div>
        <div class="stat-card">
            <div class="stat-icon"><i class="fas fa-archive"></i></div>
            <div class="stat-number">${Object.keys(stats.collections).length}</div>
            <div class="stat-label">Koleksi Dilihat</div>
        </div>
    `;
    
    // Render visitors list
    if (recentVisitors.length === 0) {
        document.getElementById('visitorsList').innerHTML = `
            <div class="empty-state">
                <i class="fas fa-user-slash"></i>
                <p>Belum ada pengunjung</p>
            </div>
        `;
    } else {
        document.getElementById('visitorsList').innerHTML = recentVisitors.map(v => `
            <div class="visitor-item">
                <div class="visitor-avatar">${v.name.charAt(0).toUpperCase()}</div>
                <div class="visitor-info">
                    <div class="visitor-name">${v.name}</div>
                    <div class="visitor-meta">
                        Terakhir: ${new Date(v.lastVisit).toLocaleString('id-ID')}
                    </div>
                </div>
                <div class="visitor-stats">
                    <div class="visitor-visits">${v.visitCount}x</div>
                    <div class="visitor-label">kunjungan</div>
                </div>
            </div>
        `).join('');
    }
    
    // Render chart
    const ctx = document.getElementById('visitsChart').getContext('2d');
    new Chart(ctx, {
        type: 'line',
        data: {
            labels: dailyStats.map(d => d.label),
            datasets: [
                {
                    label: 'Pengunjung Unik',
                    data: dailyStats.map(d => d.visitors),
                    borderColor: '#006994',
                    backgroundColor: 'rgba(0, 105, 148, 0.1)',
                    tension: 0.4
                },
                {
                    label: 'Total Kunjungan',
                    data: dailyStats.map(d => d.visits),
                    borderColor: '#ff6b6b',
                    backgroundColor: 'rgba(255, 107, 107, 0.1)',
                    tension: 0.4
                }
            ]
        },
        options: {
            responsive: true,
            plugins: {
                legend: {
                    position: 'top',
                }
            },
            scales: {
                y: {
                    beginAtZero: true,
                    ticks: {
                        stepSize: 1
                    }
                }
            }
        }
    });
}

// Reset analytics
function resetAnalytics() {
    if (confirm('Yakin ingin reset semua data analytics?')) {
        analyticsManager.reset();
        loadDashboard();
        alert('Data analytics berhasil direset!');
    }
}

// Load dashboard on page load
loadDashboard();
</script>

</body>
</html>
